<script>
  // ============================================
  // VARIABLES GLOBALES - Optimized
  // ============================================
  let operacionesData = { activas: [], completadas: [] };
  let prevHistorialCount = 0;
  let currentSheet = "CAPITAL 1";
  let capitalInicializado = false;
  let selectedInterestMonth = "";
  const DEFAULT_SHEET_NAME = "CAPITAL 1";
  const ETH_PRICE_REFRESH_MS = 3000;
  const P2P_REFRESH_MS = 60000;
  const GAS_BOOT_RETRY_MS = 80;
  const GAS_BOOT_MAX_ATTEMPTS = 45;
  let ethPriceTimer = null;
  let ethPriceRequestInFlight = false;
  let p2pRequestInFlight = false;
  let cargaInicialIniciada = false;
  let resumenCargado = false;
  let resumenRequestInFlight = false;
  let resumenRequestSeq = 0;
  let resumenUltimaClave = "";
  let resumenRetryTimer = null;
  let evolucionCapitalData = null;
  let evolucionCapitalRango = "max";

  const FORMATO_NUMERO = new Intl.NumberFormat("es-ES", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 4,
  });
  const FORMATO_USD = new Intl.NumberFormat("es-ES", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
  const FORMATO_CRYPTO = new Intl.NumberFormat("es-ES", {
    minimumFractionDigits: 6,
    maximumFractionDigits: 6,
  });

  // Cache de elementos DOM frecuentes
  const DOM = {};
  const cacheDOM = () => {
    [
      "formOperacion",
      "capitalOperacion",
      "modalDetalle",
      "modalEvolucionCapital",
      "capitalChartContent",
      "activasContainer",
      "historialContainer",
      "resumenContainer",
      "toastContainer",
      "fechaInicio",
      "cex",
      "monto",
      "moneda",
      "apr",
      "tipoOperacion",
      "precioObjetivo",
      "countActivas",
      "countHistorial",
      "btnGuardar",
      "btnCancelar",
      "ethPriceWidget",
      "ethPriceValue",
      "ethPriceStatus",
      "btnArchivarCapital",
      "capitalArchivadoSelect",
      "capitalArchivadoCount",
      "btnRestaurarCapital",
      "archivoCapitalesPanel",
      "hasFechaFin",
      "fechaFinCustom",
      "groupFechaFin",
    ].forEach((id) => {
      DOM[id] = document.getElementById(id);
    });
  };

  // Lista de CEX disponibles
  const CEX_LIST = ["Binance", "Bybit", "OKX", "Bitget"];

  // Debounce utility parainputs
  const debounce = (fn, delay = 300) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn.apply(this, args), delay);
    };
  };

  // RAF utility con fallback: evita que estados criticos queden pausados si la
  // pagina carga en segundo plano o el navegador aplaza frames.
  const raf = (fn) => {
    let ejecutado = false;
    const ejecutar = () => {
      if (ejecutado) return;
      ejecutado = true;
      fn();
    };
    const frameId = requestAnimationFrame(ejecutar);
    setTimeout(ejecutar, 120);
    return frameId;
  };
  const $ = (id) => DOM[id] || document.getElementById(id);
  const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
  const refreshIcons = () => {
    if (window.lucide?.createIcons) lucide.createIcons();
  };
  const escapeCssValue = (value) =>
    window.CSS?.escape
      ? CSS.escape(String(value))
      : String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'");

  function skeletonTabla(cantidad) {
    const rows = Array.from({ length: cantidad || 3 }, () => '<div class="skeleton skeleton-row"></div>').join("");
    return `<div class="skeleton-table" aria-hidden="true">${rows}</div>`;
  }

  function skeletonResumen() {
    return `
      <div class="skeleton-summary" aria-hidden="true">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>
    `;
  }

  function mostrarSkeletonsIniciales() {
    if (DOM.activasContainer) DOM.activasContainer.innerHTML = skeletonTabla(4);
    if (DOM.historialContainer) DOM.historialContainer.innerHTML = skeletonTabla(4);
    if (DOM.resumenContainer) {
      DOM.resumenContainer.classList.remove("show");
      DOM.resumenContainer.innerHTML = skeletonResumen();
    }
  }

  function esperarGASDisponible(onReady, intento) {
    if (isGASAvailable()) {
      onReady();
      return;
    }

    const intentoActual = intento || 0;
    if (intentoActual >= GAS_BOOT_MAX_ATTEMPTS) {
      mostrarErrorCarga("No se pudo conectar con Google Apps Script");
      renderizarErrorResumen("No se pudo conectar con Google Apps Script");
      return;
    }

    setTimeout(
      () => esperarGASDisponible(onReady, intentoActual + 1),
      GAS_BOOT_RETRY_MS,
    );
  }

  function iniciarCargaInicialDashboard() {
    if (cargaInicialIniciada) return;
    cargaInicialIniciada = true;
    mostrarSkeletonsIniciales();

    esperarGASDisponible(function () {
      cargarOperaciones(true);
      cargarResumen(true, { force: true });
      cargarPrecioETH();
      setTimeout(actualizarTablaP2P, 2000);
    });
  }

  function claveResumenActual() {
    return [currentSheet || DEFAULT_SHEET_NAME, selectedInterestMonth || ""].join("|");
  }

  function programarVerificacionResumen() {
    clearTimeout(resumenRetryTimer);
    resumenRetryTimer = setTimeout(function () {
      if (!resumenCargado && !resumenRequestInFlight && isGASAvailable()) {
        cargarResumen(true, { force: true });
      }
    }, 4500);
  }

  function renderizarErrorResumen(mensaje) {
    if (!DOM.resumenContainer) return;
    resumenCargado = false;
    DOM.resumenContainer.classList.add("show");
    DOM.resumenContainer.innerHTML = `
      <div class="error-state">
        <i data-lucide="alert-triangle" class="error-state-icon" style="width:48px; height:48px;"></i>
        <h3>Resumen no disponible</h3>
        <p>${sanitize(mensaje || "No se pudo cargar el resumen financiero")}</p>
        <button onclick="cargarResumen(false, { force: true })" class="btn btn-primary" style="margin-top:4px;">
          <i data-lucide="rotate-cw" style="width:16px; height:16px;"></i> Reintentar
        </button>
      </div>
    `;
    refreshIcons();
  }

  document.addEventListener("DOMContentLoaded", function () {
    console.log("DOM cargado, inicializando...");
    cacheDOM();
    refreshIcons();

    setFechaHoraActual();
    cargarCEXSelect();
    establecerOtrosPredeterminados();

    // Using cached DOM element
    DOM.formOperacion.addEventListener("submit", guardarOperacion);

    // Función helper para crear listeners de limpieza de errores
    const createClearErrorListener = (groupId) => () =>
      clearFieldError(groupId);

    // Limpiar errores al interactuar con los campos
    DOM.fechaInicio.addEventListener(
      "input",
      function () {
        clearFieldError("groupFecha");
        if (DOM.hasFechaFin && DOM.hasFechaFin.checked && DOM.fechaInicio.value) {
          const fechaInicioVal = DOM.fechaInicio.value.split("T")[0];
          DOM.fechaFinCustom.min = fechaInicioVal;
        }
      }
    );
    DOM.fechaFinCustom.addEventListener(
      "change",
      createClearErrorListener("groupFechaFin"),
    );
    DOM.capitalOperacion.addEventListener(
      "change",
      createClearErrorListener("groupCapitalOperacion"),
    );
    DOM.cex.addEventListener("change", createClearErrorListener("groupCex"));
    DOM.monto.addEventListener("input", createClearErrorListener("groupMonto"));
    DOM.moneda.addEventListener("change", manejarCambioMoneda);
    DOM.apr.addEventListener("input", createClearErrorListener("groupApr"));
    DOM.tipoOperacion.addEventListener(
      "change",
      createClearErrorListener("groupTipo"),
    );
    DOM.precioObjetivo.addEventListener(
      "input",
      createClearErrorListener("groupPrecio"),
    );

    if (DOM.modalDetalle) {
      DOM.modalDetalle.addEventListener("click", function (e) {
        if (e.target === this) cerrarModal();
      });
    }

    if (DOM.modalEvolucionCapital) {
      DOM.modalEvolucionCapital.addEventListener("click", function (e) {
        if (e.target === this) cerrarModalEvolucionCapital();
      });
    }

    // Cerrar cualquier dropdown abierto al hacer click fuera
    document.addEventListener("click", function (e) {
      $$(".custom-options.show, #capitalOptions.show").forEach(function (opts) {
        const container =
          opts.closest(".custom-select-container") ||
          opts.closest(".capital-selector-container");
        if (container && !container.contains(e.target)) {
          opts.classList.remove("show");
          const trigger = container.querySelector(".custom-select-trigger");
          if (trigger) trigger.classList.remove("active");
          container.classList.remove("open");
          container.closest(".card")?.classList.remove("dropdown-open");
        }
      });
    });

    // Keyboard accessibility for theme toggle
    const themeBtn = $("themeToggleBtn");
    if (themeBtn) {
      themeBtn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleTheme();
        }
      });
    }

    // Global Escape key to close modals
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if ($("modalFormulario")?.classList.contains("active")) {
          cerrarFormularioDirecto();
        }
        if ($("modalDetalle")?.classList.contains("active")) {
          cerrarModal();
        }
        if ($("modalEvolucionCapital")?.classList.contains("active")) {
          cerrarModalEvolucionCapital();
        }
        if ($("modalCapital")?.classList.contains("show")) {
          cerrarModalCapitalDirecto();
        }
        $("confirmModal")?.remove();
        $("editB6Modal")?.remove();
      }
    });

    // Focus management for modals
    const modalForm = $("modalFormulario");
    if (modalForm) {
      const observer = new MutationObserver(function () {
        if (modalForm.classList.contains("active")) {
          const firstInput = modalForm.querySelector("input, select, button");
          if (firstInput)
            setTimeout(function () {
              firstInput.focus();
            }, 100);
        }
      });
      observer.observe(modalForm, {
        attributes: true,
        attributeFilter: ["class"],
      });
    }

    // Carga inicial coordinada para evitar carreras entre capitales y resumen.
    iniciarCargaInicialDashboard();

    document.addEventListener("visibilitychange", function () {
      if (
        document.visibilityState === "visible" &&
        !resumenCargado &&
        !resumenRequestInFlight
      ) {
        cargarResumen(true, { force: true });
      }
    });

    window.addEventListener("pageshow", function () {
      if (!resumenCargado && !resumenRequestInFlight) {
        cargarResumen(true, { force: true });
      }
    });

    ethPriceTimer = setInterval(
      () => cargarPrecioETH(true),
      ETH_PRICE_REFRESH_MS,
    );

    setInterval(actualizarTablaP2P, P2P_REFRESH_MS);

    // Delegación de eventos para tablas - Optimizada
    const setupDelegation = (id) => {
      const container = $(id);
      if (!container) return;

      // Usar evento delegated
      container.addEventListener(
        "click",
        function (e) {
          const target = e.target;
          const row = target.closest(".operacion-row");
          if (!row) return;

          const fila = parseInt(row.dataset.fila || "0");
          const sheetName = row.dataset.sheet || currentSheet;
          const isHist = row.dataset.historial === "true";

          if (target.closest(".editable")) return;

          const btn = target.closest(".btn-icon");
          if (btn) {
            e.stopPropagation();
            if (btn.classList.contains("btn-edit"))
              cargarEdicionOperacion(fila, sheetName);
            if (btn.classList.contains("btn-delete")) eliminarOperacionUI(fila, sheetName);
            return;
          }

          if (target.closest("select") || target.closest("input")) {
            e.stopPropagation();
            return;
          }

          mostrarDetalle(fila, isHist, sheetName);
        },
        { passive: true },
      );
    };

    setupDelegation("activasContainer");
    setupDelegation("historialContainer");
  });

  const TIPO_POR_MONEDA = {
    USDT: ["Buy ETH low", "Buy BTC low"],
    ETH: ["Sell ETH high"],
    BTC: ["Sell BTC high"],
  };

  function manejarCambioMoneda() {
    clearFieldError("groupMoneda");
    actualizarStepMonto(DOM.moneda.value);
    filtrarOpcionesTipo(DOM.moneda.value);
  }

  function filtrarOpcionesTipo(moneda) {
    const opciones = DOM.tipoOperacion.querySelectorAll("option");
    const permitidas = TIPO_POR_MONEDA[moneda] || null;

    opciones.forEach(function (opt) {
      if (!opt.value) return;
      if (permitidas) {
        opt.disabled = !permitidas.includes(opt.value);
      } else {
        opt.disabled = false;
      }
    });

    const actual = DOM.tipoOperacion.value;
    if (permitidas && !permitidas.includes(actual)) {
      DOM.tipoOperacion.value = permitidas[0] || "";
    }
  }

  // ============================================
  // CONFIGURACION
  // ============================================
  function setFechaHoraActual() {
    try {
      // Create date in UTC to avoid timezone issues
      const ahora = new Date();
      // Set to 4:00 AM in UTC
      const fechaUTC = new Date(
        Date.UTC(
          ahora.getUTCFullYear(),
          ahora.getUTCMonth(),
          ahora.getUTCDate(),
          4,
          0,
          0,
          0,
        ),
      );

      // Format as YYYY-MM-DDTHH:mm for datetime-local input
      const year = fechaUTC.getUTCFullYear();
      const month = String(fechaUTC.getUTCMonth() + 1).padStart(2, "0");
      const day = String(fechaUTC.getUTCDate()).padStart(2, "0");
      const hours = String(fechaUTC.getUTCHours()).padStart(2, "0");
      const minutes = String(fechaUTC.getUTCMinutes()).padStart(2, "0");

      DOM.fechaInicio.value = `${year}-${month}-${day}T${hours}:${minutes}`;

      if (DOM.fechaFinCustom) {
        DOM.fechaFinCustom.min = `${year}-${month}-${day}`;
      }
    } catch (e) {
      console.error("Error al establecer fecha:", e);
      // Fallback to current time
      const ahora = new Date();
      const localISO = ahora.toISOString().slice(0, 16);
      DOM.fechaInicio.value = localISO;

      if (DOM.fechaFinCustom) {
        DOM.fechaFinCustom.min = localISO.split("T")[0];
      }
    }
  }

  function cargarCEXSelect() {
    try {
      const select = DOM.cex;
      const trigger = document.getElementById("cexTrigger");
      const optionsContainer = document.getElementById("cexOptions");
      const selectedText = document.getElementById("cexSelectedText");
      const container = document.getElementById("cexCustomContainer");

      if (!select || !trigger || !optionsContainer) return;

      // Clear existing options
      select.innerHTML = "";
      optionsContainer.innerHTML = "";

      const defaultOpt = document.createElement("option");
      defaultOpt.value = "";
      defaultOpt.textContent = "Seleccionar CEX...";
      select.appendChild(defaultOpt);

      CEX_LIST.forEach((cex) => {
        // Opción en select oculto
        const option = document.createElement("option");
        option.value = cex;
        option.textContent = cex;
        select.appendChild(option);

        // Opción en UI personalizada (solo texto)
        const customOpt = document.createElement("div");
        customOpt.className = "custom-option";
        customOpt.dataset.value = cex;
        customOpt.innerHTML = `<span>${cex}</span>`;

        // CORREGIDO: Cambiar onclick por addEventListener y mejorar la lógica
        customOpt.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          seleccionarCEX(cex);

          // Cerrar el dropdown después de seleccionar
          optionsContainer.classList.remove("show");
          trigger.classList.remove("active");
          container.classList.remove("open");
          container.closest(".card")?.classList.remove("dropdown-open");
        });

        optionsContainer.appendChild(customOpt);
      });

      // Función para cerrar todos los dropdowns
      const closeAllDropdowns = () => {
        document.querySelectorAll(".custom-options.show").forEach((opt) => {
          opt.classList.remove("show");
          opt.closest(".custom-select-container")?.classList.remove("open");
          opt.closest(".card")?.classList.remove("dropdown-open");
        });
        document
          .querySelectorAll(".custom-select-trigger.active")
          .forEach((tr) => {
            tr.classList.remove("active");
          });
      };

      trigger.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleCEXDropdown();
      });

      trigger.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleCEXDropdown();
        }
      });

      function toggleCEXDropdown() {
        const isOpen = optionsContainer.classList.contains("show");

        closeAllDropdowns();

        if (!isOpen) {
          optionsContainer.classList.add("show");
          trigger.classList.add("active");
          container.classList.add("open");
          container.closest(".card")?.classList.add("dropdown-open");
        } else {
          optionsContainer.classList.remove("show");
          trigger.classList.remove("active");
          container.classList.remove("open");
          container.closest(".card")?.classList.remove("dropdown-open");
        }
      }

      // Valor inicial
      seleccionarCEX("OKX");
    } catch (e) {
      console.error("Error al cargar CEX:", e);
    }
  }

  function seleccionarCEX(valor) {
    const select = DOM.cex;
    const selectedText = document.getElementById("cexSelectedText");
    const options = document.querySelectorAll(".custom-option");

    if (select) select.value = valor;

    if (selectedText) {
      if (valor) {
        selectedText.textContent = valor;
      } else {
        selectedText.textContent = "Seleccionar CEX...";
      }
    }

    // Marcar como seleccionada en la UI
    options.forEach((opt) => {
      opt.classList.toggle("selected", opt.dataset.value === valor);
    });
  }

  function establecerOtrosPredeterminados() {
    try {
      // Using cached DOM elements
      DOM.moneda.value = "USDT";
      filtrarOpcionesTipo("USDT");
      DOM.tipoOperacion.value = "Buy ETH low";

      // Establecer el step adecuado según la moneda
      actualizarStepMonto(DOM.moneda.value);
    } catch (e) {
      console.error("Error al establecer otros predeterminados:", e);
    }
  }

  // ============================================
  // FUNCIONES ADICIONALES
  // ============================================

  // Función para actualizar el atributo step del campo monto según la moneda
  function actualizarStepMonto(moneda) {
    DOM.monto.step =
      moneda === "ETH" || moneda === "BTC" ? "0.000001" : "0.0001";
  }

  // Función para limitar decimales según moneda: ETH/BTC = 6, USDT = 4
  function limitarDecimalesMonto(e) {
    const moneda = DOM.moneda.value;
    const maxDec = moneda === "ETH" || moneda === "BTC" ? 6 : 4;
    const partes = e.target.value.split(".");
    if (partes.length > 1 && partes[1].length > maxDec) {
      e.target.value = partes[0] + "." + partes[1].slice(0, maxDec);
    }
  }

  // ============================================
  // GUARDAR OPERACION
  // ============================================
  // Función para validar todos los campos del formulario
  function validarFormulario() {
    // Limpiar errores previos
    clearFormErrors();

    const capitalOperacion = DOM.capitalOperacion.value || currentSheet;
    if (!capitalOperacion) {
      showFieldError("groupCapitalOperacion", "errorCapitalOperacion");
      return { valid: false, field: "capitalOperacion" };
    }

    const fechaInput = DOM.fechaInicio.value;
    if (!fechaInput) {
      showFieldError("groupFecha", "errorFecha");
      return { valid: false, field: "fechaInicio" };
    }

    const [datePart, timePart] = fechaInput.split("T");
    const hour = timePart.split(":")[0];
    const fechaLocalExacta = datePart + "T" + hour + ":00";

    const cex = DOM.cex.value;
    if (!cex) {
      showFieldError("groupCex", "errorCex");
      return { valid: false, field: "cex" };
    }

    const moneda = DOM.moneda.value;
    if (!moneda) {
      showFieldError("groupMoneda", "errorMoneda");
      return { valid: false, field: "moneda" };
    }

    const montoStr = DOM.monto.value;
    const monto = parseFloat(montoStr);
    if (!monto || isNaN(monto) || monto <= 0) {
      showFieldError("groupMonto", "errorMonto");
      return { valid: false, field: "monto" };
    }
    const partes = montoStr.split(".");
    const maxDec = moneda === "ETH" || moneda === "BTC" ? 6 : 4;
    if (partes.length > 1 && partes[1].length > maxDec) {
      showFieldError("groupMonto", "errorMonto");
      return { valid: false, field: "monto" };
    }

    const apr = parseFloat(DOM.apr.value);
    if (!apr || isNaN(apr) || apr <= 0) {
      showFieldError("groupApr", "errorApr");
      return { valid: false, field: "apr" };
    }

    const tipoOperacion = DOM.tipoOperacion.value;
    if (!tipoOperacion) {
      showFieldError("groupTipo", "errorTipo");
      return { valid: false, field: "tipoOperacion" };
    }

    const tiposPermitidos = TIPO_POR_MONEDA[moneda];
    if (tiposPermitidos && !tiposPermitidos.includes(tipoOperacion)) {
      showFieldError("groupTipo", "errorTipo");
      return { valid: false, field: "tipoOperacion" };
    }

    const precioObjetivo = parseFloat(
      DOM.precioObjetivo.value,
    );
    if (!precioObjetivo || isNaN(precioObjetivo) || precioObjetivo <= 0) {
      showFieldError("groupPrecio", "errorPrecio");
      return { valid: false, field: "precioObjetivo" };
    }

    let fechaFinExacta = null;
    if (DOM.hasFechaFin && DOM.hasFechaFin.checked) {
      const fechaFinInput = DOM.fechaFinCustom.value;
      if (!fechaFinInput) {
        showFieldError("groupFechaFin", "errorFechaFin");
        return { valid: false, field: "fechaFinCustom" };
      }

      // Combine date with T03:00
      fechaFinExacta = fechaFinInput + "T03:00";

      const dInicio = new Date(fechaLocalExacta.replace("T", " ").substring(0, 16).replace(/-/g, "/"));
      const dFin = new Date((fechaFinInput + " 03:00:00").replace(/-/g, "/"));
      if (dFin.getTime() <= dInicio.getTime()) {
        showFieldError("groupFechaFin", "errorFechaFin");
        return { valid: false, field: "fechaFinCustom" };
      }
    }

    return {
      valid: true,
      datos: {
        fechaInicio: fechaLocalExacta,
        fechaFin: fechaFinExacta,
        capitalOperacion,
        cex,
        monto,
        moneda,
        apr,
        tipoOperacion,
        precioObjetivo,
      },
    };
  }

  function setFormLoading(loading) {
    const btn = DOM.btnGuardar;
    if (!btn) return;
    const iconNormal = btn.querySelector(".btn-icon-normal");
    const spinnerContainer = btn.querySelector(".btn-spinner-container");
    const btnText = btn.querySelector(".btn-text");
    if (loading) {
      btn.disabled = true;
      if (iconNormal) iconNormal.style.display = "none";
      if (spinnerContainer) spinnerContainer.style.display = "inline-flex";
      if (btnText)
        btnText.textContent = window.editandoFila
          ? "Actualizando"
          : "Guardando";
      btn.classList.add("btn-loading");
    } else {
      btn.disabled = false;
      if (iconNormal) iconNormal.style.display = "";
      if (spinnerContainer) spinnerContainer.style.display = "none";
      if (btnText)
        btnText.textContent = window.editandoFila
          ? "Actualizar Operación"
          : "Guardar Operación";
      btn.classList.remove("btn-loading");
    }
  }

  function guardarOperacion(e) {
    e.preventDefault();
    console.log("Guardando operación...");

    setFormLoading(true);

    try {
      const validacion = validarFormulario();
      if (!validacion.valid) {
        setFormLoading(false);
        return;
      }

      const { datos } = validacion;

      console.log("Datos a enviar:", datos);

      if (!isGASAvailable()) {
        showAlert("error", "No se pudo conectar con Google Apps Script");
        setFormLoading(false);
        return;
      }

      const estabaEditando = !!window.editandoFila;
      const sheetDestino = estabaEditando
        ? window.editandoSheet || currentSheet
        : datos.capitalOperacion || currentSheet;
      if (estabaEditando) datos.fila = window.editandoFila;

      cerrarFormularioDirecto();
      raf(() => {
        if (!estabaEditando) {
          crearFilaPendiente({ ...datos, capitalOperacion: sheetDestino });
        }
      });

      window.editandoFila = null;
      window.editandoSheet = null;
      DOM.formOperacion.reset();
      resetCustomFechaFin();
      DOM.capitalOperacion.disabled = false;
      DOM.capitalOperacion.value = currentSheet;
      if (DOM.btnCancelar) DOM.btnCancelar.style.display = "none";
      DOM.btnGuardar?.classList.remove("btn-warning");
      setFechaHoraActual();
      clearFormErrors();
      setFormLoading(false);

      const successHandler = function (response) {
        setFormLoading(false);
        console.log("Respuesta servidor:", response);
        if (response && response.success) {
          showAlert(
            "success",
            estabaEditando
              ? "Operación actualizada correctamente"
              : "Operación guardada correctamente",
          );

          if (estabaEditando && response.operacion) {
            actualizarOperacionActiva(response.operacion);
          } else {
            cargarOperaciones(true);
          }
          cargarResumen(true, { force: true });
        } else {
          showAlert("error", extraerMensaje(response, "Error en el servidor"));
          cargarOperaciones(true); // Recargar por si acaso para quitar la fila pendiente
        }
      };

      const failureHandler = function (error) {
        setFormLoading(false);
        console.error("Error de servidor:", error);
        showAlert(
          "error",
          "Error: " + extraerMensaje(error, "Error desconocido"),
        );
        cargarOperaciones(true); // Recargar
      };

      if (estabaEditando) {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .actualizarOperacionFila(datos, sheetDestino);
      } else {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .agregarOperacion(datos, sheetDestino);
      }
    } catch (error) {
      console.error("Error en guardarOperacion:", error);
      setFormLoading(false);
      showAlert("error", "Error: " + (error.message || "Error desconocido"));
    }
  }

  // ============================================
  // PRECIO ETH - Binance
  // ============================================
  function cargarPrecioETH(silent) {
    if (!DOM.ethPriceValue || !DOM.ethPriceStatus) return;
    if (ethPriceRequestInFlight) return;

    if (!silent) {
      DOM.ethPriceValue.textContent = "Cargando...";
      DOM.ethPriceStatus.textContent = "Binance";
      DOM.ethPriceWidget?.classList.remove("eth-price-error");
    }

    ethPriceRequestInFlight = true;
    fetchPrecioETHCliente()
      .then(renderizarPrecioETH)
      .catch(function (error) {
        if (DOM.ethPriceValue.textContent === "Cargando...") {
          DOM.ethPriceValue.textContent = "Sin dato";
        }
        DOM.ethPriceStatus.textContent = "Error";
        DOM.ethPriceWidget.title = extraerMensaje(
          error,
          "No se pudo obtener ETH/USDT desde Binance",
        );
        DOM.ethPriceWidget?.classList.add("eth-price-error");
      })
      .finally(function () {
        ethPriceRequestInFlight = false;
      });
  }

  async function fetchPrecioETHCliente() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);

    try {
      const response = await fetch(
        "https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT",
        {
          method: "GET",
          cache: "no-store",
          signal: controller.signal,
          headers: { Accept: "application/json" },
        },
      );

      const text = await response.text();
      if (!response.ok) {
        throw new Error(
          "Binance respondio con codigo " +
            response.status +
            ": " +
            text.slice(0, 120),
        );
      }

      const data = JSON.parse(text);
      return {
        success: true,
        price: parseFloat(data.price),
        symbol: data.symbol || "ETHUSDT",
        source: "Binance",
      };
    } finally {
      clearTimeout(timeoutId);
    }
  }

  function renderizarPrecioETH(response) {
    if (!DOM.ethPriceValue || !DOM.ethPriceStatus) return;

    if (
      response?.success &&
      response.price !== null &&
      !isNaN(Number(response.price))
    ) {
      DOM.ethPriceValue.textContent = formatearPrecioUSD(response.price);
      DOM.ethPriceStatus.textContent = response.source || "Binance";
      DOM.ethPriceWidget.title = "Precio actual ETH/USDT en Binance";
      DOM.ethPriceWidget?.classList.remove("eth-price-error");
      actualizarReferenciasETHMes();
      return;
    }

    DOM.ethPriceValue.textContent = "Sin dato";
    DOM.ethPriceStatus.textContent = "Error";
    DOM.ethPriceWidget.title =
      response?.message || "No se pudo obtener el precio ETH/USDT";
    DOM.ethPriceWidget?.classList.add("eth-price-error");
  }

  function cargarOperaciones(silent) {
    console.log("Cargando operaciones...");
    if (!isGASAvailable()) {
      mostrarErrorCarga("No se pudo conectar con Google Apps Script");
      return;
    }

    if (!silent) {
      raf(() => {
        DOM.activasContainer.innerHTML = skeletonTabla(4);
        DOM.historialContainer.innerHTML = skeletonTabla(4);
      });
    }

    google.script.run
      .withSuccessHandler(renderizarOperaciones)
      .withFailureHandler(function (error) {
        showAlert("error", "Error al cargar operaciones: " + error);
      })
      .obtenerOperacionesDashboard(currentSheet);
  }

  function renderizarOperaciones(response) {
    if (response && response.success) {
      const sheetCambiada =
        response.selectedSheet && response.selectedSheet !== currentSheet;
      if (response.capitals) {
        poblarSelectorCapitales(response.capitals, response.archived || []);
      }
      if (response.selectedSheet && response.selectedSheet !== currentSheet) {
        currentSheet = response.selectedSheet;
        actualizarSelectorCapital(currentSheet);
      }
      const oldCompletadasLen = operacionesData.completadas
        ? operacionesData.completadas.length
        : 0;
      const newCompletadas = response.completadas || [];
      operacionesData = response;
      raf(() => {
        renderizarActivas(response.activas || []);
        renderizarHistorial(newCompletadas, oldCompletadasLen);
      });
      if (sheetCambiada) cargarResumen(true, { force: true });
    } else {
      showAlert(
        "error",
        response ? response.message : "Error al cargar operaciones",
      );
    }
  }

  function cargarResumen(silent, options = {}) {
    console.log("Cargando resumen...");
    if (!isGASAvailable()) {
      if (DOM.resumenContainer) {
        renderizarErrorResumen("No se pudo conectar con Google Apps Script");
      }
      return;
    }

    const clave = claveResumenActual();
    if (
      resumenRequestInFlight &&
      resumenUltimaClave === clave &&
      !options.force
    ) {
      return;
    }

    const requestId = ++resumenRequestSeq;
    resumenRequestInFlight = true;
    resumenUltimaClave = clave;
    if (!silent) resumenCargado = false;

    if (!silent) {
      raf(() => {
        DOM.resumenContainer.innerHTML = skeletonResumen();
      });
    }

    programarVerificacionResumen();

    google.script.run
      .withSuccessHandler(function (resumen) {
        if (requestId !== resumenRequestSeq) return;
        resumenRequestInFlight = false;
        if (!resumen?.success) {
          renderizarErrorResumen(
            extraerMensaje(resumen, "No se pudo cargar el resumen financiero"),
          );
          return;
        }
        renderizarResumen(resumen);
      })
      .withFailureHandler(function (error) {
        if (requestId !== resumenRequestSeq) return;
        resumenRequestInFlight = false;
        renderizarErrorResumen(
          extraerMensaje(error, "No se pudo cargar el resumen financiero"),
        );
        showAlert("error", "Error al cargar resumen: " + error);
      })
      .obtenerResumen(currentSheet, selectedInterestMonth);
  }

  function cargarHistorial(silent) {
    if (!isGASAvailable()) {
      if (DOM.historialContainer) {
        DOM.historialContainer.innerHTML =
          '<p class="error-text">No se pudo conectar con Google Apps Script</p>';

      return;

    if (!silent) {
      raf(() => {
        DOM.historialContainer.innerHTML = skeletonTabla(4);
      });

    google.script.run
      .withSuccessHandler(function (response) {
        if (response && response.success) {
          const oldCompletadasLen = operacionesData.completadas
            ? operacionesData.completadas.length
            : 0;
          operacionesData.completadas = response.completadas || [];
          raf(() => renderizarHistorial(operacionesData.completadas, oldCompletadasLen));
        } else {
          showAlert(
            "error",
            response ? response.message : "Error al cargar historial",
          );
        }
      })
      .withFailureHandler(function (error) {
        showAlert("error", "Error al cargar historial: " + error);
      })
      .obtenerOperaciones(currentSheet);

    const textNode = el.firstChild;
    if (textNode && textNode.nodeType === 3) {

      (item) =>

        (item.sheetName || currentSheet) === sheetName,
    );
    if (index === -1) {
      cargarOperaciones(true);
      return;

    operacionesData.activas[index] = op;
    const filaActual = document.querySelector(
      `.operacion-row[data-fila='${op.fila}'][data-sheet='${escapeCssValue(sheetName)}']:not([data-historial="true"])`,
    );
    if (!filaActual) {
      cargarOperaciones(true);
      return;
    }

    const template = document.createElement("tbody");
    template.innerHTML = renderFilaActiva(op).trim();
    const filaNueva = template.firstElementChild;
    filaActual.replaceWith(filaNueva);
    actualizarTotalActivas();
    refreshIcons();
    raf(() => {
      filaNueva.classList.add("anim-row-updated");
      setTimeout(() => filaNueva.classList.remove("anim-row-updated"), 650);

  function completarOperacion(fila, monedaFinal, selectElement, sheetName) {
    if (!monedaFinal) return;
    const targetSheet = sheetName || currentSheet;

    mostrarConfirmacion(
      `¿Confirmar que la operación finalizó en ${monedaFinal}?`,
      function () {
        if (!isGASAvailable()) {
          showAlert("error", "No se pudo conectar con Google Apps Script");
          selectElement.value = "";
          return;
        }

        const opRow = document.querySelector(
          `.operacion-row[data-fila='${fila}'][data-sheet='${escapeCssValue(targetSheet)}']`,
        );
        if (opRow) {
          opRow.classList.add("anim-row-completing");
        }

        google.script.run
          .withSuccessHandler(function (response) {
            if (response && response.success) {
              if (opRow) {
                opRow.classList.remove("anim-row-completing");
                opRow.classList.add("anim-row-exit");
              }
              showAlert("success", "Operación completada correctamente");
              setTimeout(() => refrescarTodo(true), 300);
            } else {
              if (opRow) opRow.classList.remove("anim-row-completing");
              showAlert(
                "error",
                extraerMensaje(response, "Error al completar"),
              );
              selectElement.value = "";
            }
          })
          .withFailureHandler(function (error) {
            if (opRow) opRow.classList.remove("anim-row-completing");
            showAlert(
              "error",
              "Error: " + extraerMensaje(error, "Error desconocido"),
            );
            selectElement.value = "";
          })
          .completarOperacion(fila, monedaFinal, targetSheet);
      },
      function () {
        selectElement.value = "";
      },
    );
  }

    mostrarConfirmacion(

      function () {
        if (!isGASAvailable()) {
          showAlert("error", "No hay conexión");
          return;
        }

        const opRow = document.querySelector(
          `.operacion-row[data-fila='${fila}'][data-sheet='${escapeCssValue(targetSheet)}']`,
        );
        if (opRow) {
          shatterElement(opRow);
          opRow.classList.add("anim-row-collapse");

        google.script.run
          .withSuccessHandler(function (response) {
            if (response && response.success) {

            } else {
              if (opRow) {
                opRow.classList.remove("anim-row-collapse");

              showAlert("error", extraerMensaje(response, "Error al eliminar"));

          })
          .withFailureHandler(function (error) {
            if (opRow) opRow.style.display = "";
            showAlert("error", extraerMensaje(error, "Error de conexión"));
            refrescarTodo(true);
          })
          .eliminarOperacionFila(fila, targetSheet);
      },
    );

  function obtenerActivoOperacion(tipoOperacion, moneda) {
    const texto = String(tipoOperacion || moneda || "").toUpperCase();
    if (texto.includes("BTC")) return "BTC";
    if (texto.includes("ETH")) return "ETH";
    return moneda === "BTC" || moneda === "ETH" ? moneda : "ETH";
  }

  function calcularRetornosOperacion(op) {
    const tipo = String(op.tipoOperacion || "");
    const moneda = op.moneda || "USDT";
    const activo = obtenerActivoOperacion(tipo, moneda);
    const precioObjetivo = parseFloat(op.precioObjetivo);
    const monto = parseFloat(op.monto);
    const interes = parseFloat(op.interes);

    if (
      !precioObjetivo ||
      isNaN(precioObjetivo) ||
      !monto ||
      isNaN(monto) ||
      isNaN(interes)
    ) {
      return null;
    }

    const baseUSDT = moneda === "USDT" ? monto : monto * precioObjetivo;
    const totalUSDT = baseUSDT + interes;
    const baseActivo = moneda === "USDT" ? monto / precioObjetivo : monto;
    const interesActivo = interes / precioObjetivo;
    const totalActivo = baseActivo + interesActivo;
    const esCompra = tipo.startsWith("Buy");

    const escenarioUSDT = {
      condicionHtml: esCompra ? "&gt;" : "&ge;",
      monedaFinal: "USDT",
      total: totalUSDT,
      suscripcion: baseUSDT,
      interes,
      destacado: !esCompra,
      descripcion: esCompra ? "Vence por encima" : "Vence en o por encima",
    };

    const escenarioActivo = {
      condicionHtml: esCompra ? "&le;" : "&lt;",
      monedaFinal: activo,
      total: totalActivo,
      suscripcion: baseActivo,
      interes: interesActivo,
      destacado: esCompra,
      descripcion: esCompra ? "Vence en o por debajo" : "Vence por debajo",
    };

    return {
      activo,
      precioObjetivo,
      escenarios: esCompra
        ? [escenarioActivo, escenarioUSDT]
        : [escenarioUSDT, escenarioActivo],
    };
  }

  function formatearCantidadRetorno(valor, moneda) {
    if (valor === null || valor === undefined || valor === "" || isNaN(Number(valor))) {
      return "-";
    }
    if (moneda === "USDT") return FORMATO_USD.format(valor) + " USDT";
    return FORMATO_CRYPTO.format(valor) + " " + moneda;
  }

  function formatearMontoDetalle(valor, moneda) {
    const mon = moneda || "USDT";
    return formatearCantidadRetorno(valor, mon);
  }

  function formatearFinalDetalle(valor, moneda) {
    const mon = moneda || "USDT";
    return formatearCantidadRetorno(valor, mon);
  }

  function formatearPrecioRetorno(valor) {
    return formatearNumero(valor) + " USDT";
  }

  function normalizarPrecioActualUSDT(texto) {
    return String(texto || "").replace(/^\$\s*/, "") + " USDT";
  }

  function obtenerPrecioETHActualNumero() {
    const raw = DOM.ethPriceValue?.textContent || "";
    if (!raw || ["Cargando...", "Sin dato"].includes(raw)) return null;
    const normalized = raw
      .replace(/[^\d,.-]/g, "")
      .replace(/\./g, "")
      .replace(",", ".");
    const price = parseFloat(normalized);
    return isNaN(price) || price <= 0 ? null : price;
  }

    if (!precioEth || !isFinite(precioEth)) return "";

    const panel = button.closest(".returns-panel");

  function renderizarRetornosOperacion(op) {

  function parseFechaGrafica(fecha) {
    if (!fecha) return null;
    const d = new Date(String(fecha).replace(/-/g, "/"));
    return isNaN(d.getTime()) ? null : d;
  }

  function formatearFechaGrafica(fecha) {
    const d = parseFechaGrafica(fecha);
    if (!d) return "-";
    return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
  }

  function formatearFechaTooltip(fecha) {
    const d = parseFechaGrafica(fecha);
    if (!d) return "-";
    return d.toLocaleString("es-ES", {
      day: "2-digit",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function formatearUSDT(valor) {
    return FORMATO_USD.format(Number(valor) || 0) + " USDT";
  }

  function construirPathSuave(coords) {
    if (!coords.length) return "";
    if (coords.length === 1) return `M ${coords[0].x} ${coords[0].y}`;
    let d = `M ${coords[0].x} ${coords[0].y}`;
    for (let i = 0; i < coords.length - 1; i++) {
      const p0 = coords[i - 1] || coords[i];
      const p1 = coords[i];
      const p2 = coords[i + 1];
      const p3 = coords[i + 2] || p2;
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
    }
    return d;
  }

  function filtrarPuntosGraficaCapital(puntos, rango) {
    if (!Array.isArray(puntos) || puntos.length <= 2 || rango === "max") {
      return puntos || [];
    }

    const diasPorRango = { "1m": 30, "3m": 90, "6m": 180 };
    const dias = diasPorRango[rango];
    if (!dias) return puntos;

    const maxTime = Math.max(...puntos.map((p) => p.fechaObj.getTime()));
    const minTime = maxTime - dias * 86400000;
    const filtrados = puntos.filter((p) => p.fechaObj.getTime() >= minTime);

    if (filtrados.length >= 2) return filtrados;
    return puntos.slice(Math.max(0, puntos.length - 2));
  }

  function calcularResumenGraficaCapital(puntos) {
    const inicio = puntos[0]?.valor || 0;
    const actual = puntos[puntos.length - 1]?.valor || 0;
    const maximo = puntos.reduce((max, p) => Math.max(max, Number(p.valor) || 0), 0);
    const minimo = puntos.reduce(
      (min, p) => Math.min(min, Number(p.valor) || 0),
      puntos[0]?.valor || 0,
    );
    return {
      inicio,
      actual,
      maximo,
      minimo,
      cambio: actual - inicio,
      cambioPct: inicio ? ((actual - inicio) / inicio) * 100 : 0,
    };
  }

  function buildRangoGraficaButtons() {
    const opciones = [
      ["1m", "1M"],
      ["3m", "3M"],
      ["6m", "6M"],
      ["max", "Max"],
    ];
    return opciones
      .map(([key, label]) => {
        const active = key === evolucionCapitalRango ? " active" : "";
        return `<button type="button" class="capital-chart-range-btn${active}" onclick="cambiarRangoGraficaCapital('${key}')">${label}</button>`;
      })
      .join("");
  }

  function renderizarGraficaCapital(resp) {
    const content = $("capitalChartContent");
    if (!content) return;

    const todosLosPuntos = (resp.puntos || [])
      .map((p) => ({
        ...p,
        fechaObj: parseFechaGrafica(p.fecha),
        valor: Number(p.valor) || 0,
      }))
      .filter((p) => p.fechaObj && isFinite(p.valor));

    if (!todosLosPuntos.length) {
      renderizarErrorGraficaCapital(resp.message || "No hay operaciones para graficar");
      return;
    }

    const puntosFiltrados = filtrarPuntosGraficaCapital(
      todosLosPuntos,
      evolucionCapitalRango,
    );
    const puntos = puntosFiltrados.length ? puntosFiltrados : todosLosPuntos;

    const isCompactChart = window.matchMedia?.("(max-width: 560px)").matches;
    const width = isCompactChart ? 640 : 920;
    const height = isCompactChart ? 540 : 420;
    const pad = isCompactChart
      ? { top: 22, right: 18, bottom: 44, left: 32 }
      : { top: 30, right: 28, bottom: 58, left: 74 };
    const plotW = width - pad.left - pad.right;
    const plotH = height - pad.top - pad.bottom;
    const minTime = Math.min(...puntos.map((p) => p.fechaObj.getTime()));
    const maxTime = Math.max(...puntos.map((p) => p.fechaObj.getTime()));
    const minValorRaw = Math.min(...puntos.map((p) => p.valor));
    const maxValorRaw = Math.max(...puntos.map((p) => p.valor));
    const rangoValor = Math.max(1, maxValorRaw - minValorRaw);
    const minValor = Math.max(0, minValorRaw - rangoValor * 0.16);
    const maxValor = maxValorRaw + rangoValor * 0.18;
    const timeRange = Math.max(1, maxTime - minTime);
    const valueRange = Math.max(1, maxValor - minValor);

    const coords = puntos.map((p) => ({
      ...p,
      x: pad.left + ((p.fechaObj.getTime() - minTime) / timeRange) * plotW,
      y: pad.top + (1 - (p.valor - minValor) / valueRange) * plotH,
    }));

    const linePath = construirPathSuave(coords);
    const areaPath = `${linePath} L ${coords[coords.length - 1].x} ${pad.top + plotH} L ${coords[0].x} ${pad.top + plotH} Z`;
    const yTicks = Array.from({ length: 5 }, (_, i) => {
      const ratio = i / 4;
      const y = pad.top + plotH - ratio * plotH;
      const value = minValor + ratio * valueRange;
      return { y, value };
    });
    const xTicks = coords.length === 1
      ? [coords[0]]
      : Array.from({ length: Math.min(5, coords.length) }, (_, i) => {
          const idx = Math.round((i / (Math.min(5, coords.length) - 1)) * (coords.length - 1));
          return coords[idx];
        });

    const resumen = calcularResumenGraficaCapital(puntos);
    const actual = Number(resumen.actual ?? puntos[puntos.length - 1].valor) || 0;
    const cambio = Number(resumen.cambio || 0);
    const cambioPct = Number(resumen.cambioPct || 0);
    const cambioClass = cambio >= 0 ? "positive" : "negative";
    const sheetName = resp.sheetName || currentSheet;

    content.innerHTML = `

  function activarHoverGraficaCapital(coords, viewWidth, viewHeight) {
    const svg = $("capitalEvolutionSvg");
    const zone = $("capitalChartHoverZone");
    const line = $("capitalChartHoverLine");
    const dot = $("capitalChartHoverDot");
    const tooltip = $("capitalChartTooltip");
    if (!svg || !zone || !line || !dot || !tooltip || !coords.length) return;
    renderizarTooltipGraficaCapital(tooltip, coords[coords.length - 1]);
    tooltip.classList.add("active");

    const mostrarPunto = (event) => {
      const rect = svg.getBoundingClientRect();
      const clientX = event.touches?.[0]?.clientX || event.clientX;
      const svgX = ((clientX - rect.left) / rect.width) * viewWidth;
      const nearest = coords.reduce((best, p) =>
        Math.abs(p.x - svgX) < Math.abs(best.x - svgX) ? p : best,
      );

      line.setAttribute("x1", nearest.x);
      line.setAttribute("x2", nearest.x);
      dot.setAttribute("cx", nearest.x);
      dot.setAttribute("cy", nearest.y);
      line.classList.add("active");
      dot.classList.add("active");
      tooltip.classList.add("active");
      renderizarTooltipGraficaCapital(tooltip, nearest);
    };

    const ocultarPunto = () => {
      line.classList.remove("active");
      dot.classList.remove("active");
    };

    zone.addEventListener("pointerdown", mostrarPunto);
    zone.addEventListener("pointermove", mostrarPunto);
    zone.addEventListener("pointerleave", ocultarPunto);
    zone.addEventListener("touchstart", mostrarPunto, { passive: true });
    zone.addEventListener("touchmove", mostrarPunto, { passive: true });
  }

      return !isNaN(num) && num < 0;
    }

    function buildInteresesMesCard(interesesMes) {
      const rows = Array.isArray(interesesMes?.capitales)

        ? meses
            .map((month) => {

            })

        ? buildInteresesMesRows(rows)

      return `
        <div class="resumen-card resumen-month-card">
          <div class="month-interest-top">
            <h3> Intereses del ciclo</h3>
            <select
              id="interestMonthSelect"
              class="vista-capital-select month-interest-select"
              onchange="cambiarMesIntereses(this.value)"

          <div class="month-interest-list">
            <div class="month-interest-row month-interest-head">
              <span>Capital</span>
              <span>USDT</span>
              <span>ETH</span>
              <span>Operaciones</span>
            </div>
            <div id="monthInterestRows" class="month-interest-rows">${body}</div>
          </div>

    }

    const netProfitLabel =
      data.diasNetProfit !== null && data.diasNetProfit !== undefined
        ? `NET PROFIT en ${data.diasNetProfit} dias`
        : "NET PROFIT";

    let html = "";
    html += buildInteresesMesCard(data.interesesMes);

    // Si es la pestaña principal, mostrar el diseño original
    if (currentSheet === DEFAULT_SHEET_NAME) {
      if (data.cuadro1 && data.cuadro1.length > 0) {
        html += buildCard(" Resumen BBVA", data.cuadro1, {
          editableRows: [1, 3],
        });
      }
      if (data.cuadro2 && data.cuadro2.length > 0) {
        html += buildCard(" Objetivos", data.cuadro2, {
          highlightFn: (l) =>
            l.toLowerCase().includes("min") || l.toLowerCase().includes("mín"),
        });
      }

      if (data.cuadro3 && data.cuadro3.length > 0) {
        const rows = data.cuadro3;
        function parseNum(str) {
          if (!str || str === "-") return 0;
          return (
            parseFloat(
              String(str)
                .replace(/[$,%\s]/g, "")
                .replace(",", "."),
            ) || 0
          );
        }
        const ci = parseNum(rows[0] ? rows[0][2] : "0");
        const netProfit = parseNum(rows[1] ? rows[1][2] : "0");
        const promedioStr = rows[2] ? String(rows[2][2]).trim() : "-";
        const aprVal = parseNum(rows[3] ? rows[3][2] : "0");
        const diasVal = parseNum(rows[4] ? rows[4][2] : "0");
        const retiroVal = parseNum(rows[5] ? rows[5][2] : "0");
        const capFinal = parseNum(rows[6] ? rows[6][2] : "0");
        const netProfitRaw = String(rows[1][2] || "").trim();
        const netProfitClass = esValorNegativo(netProfitRaw)
          ? "negative net-profit"
          : "success net-profit";

        html += `
          <div class="resumen-card resumen-calc-card">
            <h3> Resultados</h3>
            <div class="resumen-item"><span class="resumen-label">Capital Inicial</span><span class="resumen-value">${sanitize(String(rows[0][2] || ""))}</span></div>
            <div class="resumen-item"><span class="resumen-label">${sanitize(netProfitLabel)}</span><span class="resumen-value ${netProfitClass}">${sanitize(netProfitRaw)}</span></div>
            <div class="resumen-item"><span class="resumen-label">Promedio Diario</span><span class="resumen-value highlight">${sanitize(promedioStr)}/día</span></div>
            <div class="resumen-item calc-editable-item">

            <div class="resumen-item calc-editable-item">

    } else {
      // DISENO PARA NUEVAS PESTANAS (Resumen simplificado 7 filas)
      const rows = data.cuadro3 || [];
      html += `
        <div class="resumen-card">
          <h3> Resumen Financiero</h3>
          ${rows
            .map((row, i) => {
              const rowVal = String(row[1] || "-");
              let valueClass = "";
              if (i === 2) {
                valueClass = esValorNegativo(rowVal)

                  : "success net-profit";

                valueClass = "highlight";
              }
              return `
            <div class="resumen-item">
              <span class="resumen-label">${sanitize(i === 2 ? netProfitLabel : String(row[0] || ""))}</span>

                ${(i === 0 || i === 6) && !rowVal.includes("S/") ? "S/ " : ""}${sanitize(rowVal)}${i === 3 ? "/día" : ""}
              </span>
            </div>`;
            })
            .join("")}
        </div>`;
    }

    DOM.resumenContainer.innerHTML = html || "<p>No hay datos disponibles</p>";
    raf(() => DOM.resumenContainer.classList.add("show"));

    // Agregar botón de actualizar TC junto al valor
    const tcEl = document.getElementById("tipoCambioVenta");
    if (tcEl && !document.getElementById("btnRefreshTC")) {
      const btn = document.createElement("button");
      btn.id = "btnRefreshTC";
      btn.onclick = actualizarTipoCambioManual;
      btn.title = "Actualizar TC";
      btn.style.cssText = "background:none;border:none;cursor:pointer;padding:0;margin-left:6px;vertical-align:middle;display:inline-flex;align-items:center;";
      btn.innerHTML = '<i data-lucide="refresh-cw" style="width:13px;height:13px;color:var(--primary);pointer-events:none;"></i>';
      tcEl.appendChild(btn);
      refreshIcons();
    }

    // Inicializar calculadora si existe
    const calcApr = document.getElementById("calcApr");
    if (calcApr) {
      const rows = data.cuadro3;
      const ci = parseFloat(String(rows[0][2]).replace(/[$,]/g, "")) || 0;
      const calcDias = document.getElementById("calcDias");
      const calcRetiro = document.getElementById("calcRetiro");
      const calcResult = document.getElementById("calcCapitalFinal");

      const recalcular = () => {
        const r = (parseFloat(calcApr.value) || 0) / 100 / 365;
        const d = parseFloat(calcDias.value) || 0;
        const ret = parseFloat(calcRetiro.value) || 0;
        const m = Math.floor(d / 30);
        const fC = Math.pow(1 + r, m * 30);
        const f30 = Math.pow(1 + r, 30);
        const fR = Math.pow(1 + r, d % 30);
        let cap =
          ret === 0
            ? ci * fC * fR
            : (ci * fC - (ret * (fC - 1)) / (f30 - 1)) * fR;
        cap = Math.max(0, cap);
        calcResult.textContent = "$" + FORMATO_USD.format(cap);
      };

      [calcApr, calcDias, calcRetiro].forEach((el) =>
        el.addEventListener("input", recalcular),
      );
    }

  function poblarSelectorCapitales(list, archivedList) {
    const capitales =
      Array.isArray(list) && list.length ? list : [DEFAULT_SHEET_NAME];
    const archivados = Array.isArray(archivedList) ? archivedList : [];
    const trigger = $("capitalSelectedText");
    const options = $("capitalOptions");
    const select = $("capitalSelect");
    const vistaSelect = $("vistaCapitalSelect");
    const operacionSelect = $("capitalOperacion");

    if (!trigger || !options || !select) return;
    if (!capitalInicializado) {
      currentSheet = capitales.includes(currentSheet)
        ? currentSheet
        : capitales[0];
      capitalInicializado = true;
    } else if (!capitales.includes(currentSheet)) {
      currentSheet = capitales[0];
    }

    trigger.textContent = currentSheet;
    options.innerHTML = "";
    select.innerHTML = "";
    if (vistaSelect) vistaSelect.innerHTML = "";
    if (operacionSelect) operacionSelect.innerHTML = "";

    capitales.forEach((name) => {
      const opt = document.createElement("div");
      opt.className =
        "custom-option" + (name === currentSheet ? " selected" : "");
      opt.textContent = name;
      opt.onclick = () => cambiarCapital(name);
      options.appendChild(opt);

      const nativeOpt = document.createElement("option");
      nativeOpt.value = name;
      nativeOpt.textContent = name;
      nativeOpt.selected = name === currentSheet;
      select.appendChild(nativeOpt);

      if (vistaSelect) {
        const vistaOpt = document.createElement("option");
        vistaOpt.value = name;
        vistaOpt.textContent = name;
        vistaOpt.selected = name === currentSheet;
        vistaSelect.appendChild(vistaOpt);
      }

      if (operacionSelect) {
        const opOpt = document.createElement("option");
        opOpt.value = name;
        opOpt.textContent = name;
        opOpt.selected = name === currentSheet;
        operacionSelect.appendChild(opOpt);
      }
    });

    renderizarArchivoCapitales(archivados);
    actualizarEstadoBotonArchivar(capitales);

    const triggerContainer = $("capitalTrigger");
    if (!triggerContainer) return;

    triggerContainer.onclick = (e) => {
      e.stopPropagation();
      options.classList.toggle("show");
      triggerContainer.classList.toggle("active");
    };

    triggerContainer.onkeydown = (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        options.classList.toggle("show");
        triggerContainer.classList.toggle("active");
      }
    };
  }

      select.disabled = true;
      if (btnRestaurar) btnRestaurar.disabled = true;

    list.forEach((name) => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
    select.disabled = false;
    if (btnRestaurar) btnRestaurar.disabled = false;

    if (!isGASAvailable()) {
      showAlert("error", "No se pudo conectar con Google Apps Script");

    google.script.run
      .withSuccessHandler(function (list) {
        const archivedFromResponse = Array.isArray(list) ? [] : list?.archived || [];
        list = Array.isArray(list) ? list : list?.active || list?.capitals || [];
        const trigger = $("capitalSelectedText");
        const options = $("capitalOptions");

        const vistaSelect = $("vistaCapitalSelect");
        const operacionSelect = $("capitalOperacion");

        if (!trigger || !options || !select) return;
        if (list && list.length && !capitalInicializado) {
          currentSheet = list[0];
          capitalInicializado = true;
        } else if (list && list.length && !list.includes(currentSheet)) {
          currentSheet = list[0];
        }

        trigger.textContent = currentSheet;
        options.innerHTML = "";
        select.innerHTML = "";
        if (vistaSelect) vistaSelect.innerHTML = "";
        if (operacionSelect) operacionSelect.innerHTML = "";

        list.forEach((name) => {
          // Opción para custom select
          const opt = document.createElement("div");
          opt.className =
            "custom-option" + (name === currentSheet ? " selected" : "");
          opt.textContent = name;
          opt.onclick = () => cambiarCapital(name);
          options.appendChild(opt);

          // Opción para select nativo (fallback)
          const nativeOpt = document.createElement("option");
          nativeOpt.value = name;
          nativeOpt.textContent = name;
          nativeOpt.selected = name === currentSheet;
          select.appendChild(nativeOpt);

          if (vistaSelect) {
            const vistaOpt = document.createElement("option");
            vistaOpt.value = name;
            vistaOpt.textContent = name;
            vistaOpt.selected = name === currentSheet;
            vistaSelect.appendChild(vistaOpt);
          }

          if (operacionSelect) {
            const opOpt = document.createElement("option");
            opOpt.value = name;
            opOpt.textContent = name;
            opOpt.selected = name === currentSheet;
            operacionSelect.appendChild(opOpt);
          }
        });

        renderizarArchivoCapitales(archivedFromResponse);
        actualizarEstadoBotonArchivar(list);

        // Eventos para el selector custom
        const triggerContainer = $("capitalTrigger");
        if (!triggerContainer) return;

        triggerContainer.onclick = (e) => {
          e.stopPropagation();
          options.classList.toggle("show");
          triggerContainer.classList.toggle("active");
        };

        triggerContainer.onkeydown = (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            options.classList.toggle("show");
            triggerContainer.classList.toggle("active");
          }
        };
        if (typeof onReady === "function") onReady(list);
      })
      .getCapitalsCatalog();

  function editarCelda(element, celdaRef, titulo) {
    const nota = element.getAttribute("data-note") || "";
    const formula = element.getAttribute("data-formula") || "";

    let addends = [];

    if (formula && formula.includes("+")) {
      const amounts = formula
        .replace("=", "")
        .split("+")
        .map((s) => parseFloat(s.trim()));
      // Split más robusto: por salto de línea o por punto y espacio
      const rawNotes = nota ? nota.trim().split(/\n|\. /) : [];
      addends = amounts.map((v, i) => ({
        valor: v,
        desc: limpiarDescripcion((rawNotes[i] || "").replace(/\.$/, "")),
      }));

      const rawItems = nota.trim().split(/\n|\. /);
      rawItems.forEach(function (item) {
        item = item.trim().replace(/\.$/, "");

        let val = 0;

          /(?:S\/|\$|[A-Z]{2,4})?\s*([\d]+(?:[.,][\d]+)?)$/i,
        );

        addends.push({ valor: val, desc: limpiarDescripcion(item) });

      const notaArr = finalAddends.map(

  /** Limpia descripciones de colones y montos redundantes para evitar duplicación */
  function limpiarDescripcion(str) {
    if (!str) return "";
    let clean = str.trim();
    // Regex para detectar ": S/ 123.45" o ": 123.45" al final
    // Cubre formatos: ": S/ 10", ": $10", ": 10", " S/ 10", ": USDT 10"
    const tailRegex = /[:\s]+(?:S\/|\$|[A-Z]{3,4})?\s*[\d]+(?:[.,][\d]+)?$/i;

    // Limpieza recursiva: mientras encuentre una "cola" de monto, la quita
    let previous;
    do {
      previous = clean;
      clean = clean.replace(tailRegex, "").trim();
    } while (clean !== previous);

    return clean || "Sin descripción";
  }

  /** Verifica si google.script.run está disponible */
  function isGASAvailable() {
    return (
      typeof google !== "undefined" &&
      google.script &&
      typeof google.script.run !== "undefined"
    );
  }

  /** Extrae el mensaje de error de una respuesta o Error object */
  function extraerMensaje(obj, fallback) {
    if (!obj) return fallback || "Error desconocido";
    if (typeof obj === "string") return obj;
    if (obj.message) return obj.message;
    if (obj.msg) return obj.msg;
    if (obj.error)
      return typeof obj.error === "string"
        ? obj.error
        : JSON.stringify(obj.error);
    return fallback || "Error desconocido";
  }

  /** Sanitiza texto para evitar XSS en innerHTML - Versión mejorada */
  function sanitize(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#x27;")
      .replace(/\//g, "&#x2F;")
      .replace(/`/g, "&#96;");
  }

  function formatearFecha(fecha) {
    if (!fecha) return "-";
    try {
      const d = new Date(fecha.replace(/-/g, "/"));
      if (isNaN(d.getTime())) return "-";
      return d.toLocaleString("es-ES", {
        day: "2-digit",
        month: "2-digit",
        year: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch (e) {
      return "-";
    }
  }

  function formatearNumero(num) {
    if (num === null || num === undefined || num === "" || isNaN(Number(num)))
      return "-";
    try {
      return FORMATO_NUMERO.format(parseFloat(num));
    } catch (e) {
      return "-";
    }
  }

  function formatearPrecioUSD(num) {
    if (num === null || num === undefined || num === "" || isNaN(Number(num))) {
      return "$-";
    }
    return "$" + FORMATO_USD.format(parseFloat(num));
  }

  function formatearMonto(monto, moneda) {
    const mon = moneda || "USDT";
    if (mon === "USDT") {
      if (
        monto === null ||
        monto === undefined ||
        monto === "" ||
        isNaN(Number(monto))
      )
        return "$-";
      return "$" + FORMATO_USD.format(parseFloat(monto));
    }
    if (mon === "ETH" || mon === "BTC") {
      if (
        monto === null ||
        monto === undefined ||
        monto === "" ||
        isNaN(Number(monto))
      )
        return "-";
      return FORMATO_CRYPTO.format(parseFloat(monto));
    }
    return formatearNumero(monto) + " " + mon;
  }

  function formatearFinal(valor, moneda) {
    const mon = moneda || "USDT";
    if (
      valor === null ||
      valor === undefined ||
      valor === "" ||
      isNaN(Number(valor))
    )
      return "-";
    if (mon === "USDT") {
      return "$" + FORMATO_USD.format(parseFloat(valor));
    }
    if (mon === "ETH" || mon === "BTC") {
      return FORMATO_CRYPTO.format(parseFloat(valor)) + " " + mon;
    }
    return formatearNumero(valor);
  }

  function formatearTotal(valor) {
    return valor !== null &&
      valor !== undefined &&
      valor !== "" &&
      !isNaN(Number(valor))
      ? "$" + FORMATO_USD.format(parseFloat(valor))
      : "-";
  }

  function formatearInteres(valor, moneda) {
    const mon = moneda || "USDT";
    if (
      valor === null ||
      valor === undefined ||
      valor === "" ||
      isNaN(Number(valor))
    )
      return "-";
    // Interest always in USDT with 2 decimals
    return "$" + FORMATO_USD.format(parseFloat(valor));
  }

  function showAlert(type, message) {
    const container =
      DOM.toastContainer || document.getElementById("toastContainer");
    if (!container) return;

    const icons = { success: "circle-check", error: "circle-x", info: "info" };
    const iconName = icons[type] || "circle-x";

    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span class="toast-icon"><i data-lucide="${iconName}"></i></span><span class="toast-content">${sanitize(message)}</span>`;
    container.appendChild(toast);
    refreshIcons();

    requestAnimationFrame(() => toast.classList.add("show"));

    setTimeout(() => {
      toast.classList.remove("show");
      toast.classList.add("hiding");
      setTimeout(() => toast.remove(), 300);
    }, type === "error" ? 3500 : 2400);
  }

  // Mostrar error inline en un campo específico
  function showFieldError(groupId, errorId) {
    const group = document.getElementById(groupId);
    const error = document.getElementById(errorId);
    if (group) group.classList.add("has-error");
    if (error) error.classList.add("show");
  }

  // Limpiar todos los errores del formulario
  function clearFormErrors() {
    document.querySelectorAll(".form-group.has-error").forEach((el) => {
      el.classList.remove("has-error");
    });
    document.querySelectorAll(".form-error.show").forEach((el) => {
      el.classList.remove("show");
    });
  }

  // Limpiar error al interactuar con el campo
  function clearFieldError(groupId) {
    const group = document.getElementById(groupId);
    if (group) group.classList.remove("has-error");
    const errorEl = group?.querySelector(".form-error");
    if (errorEl) errorEl.classList.remove("show");
  }

  function showLoading(elementId, show) {
    const element = document.getElementById(elementId);
    if (element) {
      element.classList.toggle("show", show);
    }
  }

  function mostrarConfirmacion(mensaje, onConfirm, onCancel) {
    const overlay = document.createElement("div");
    overlay.id = "confirmModal";
    overlay.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.85);display:flex;align-items:center;
    justify-content:center;z-index:9999;padding:20px;
    backdrop-filter:blur(16px);animation:fadeIn 0.2s ease;
  `;

    overlay.innerHTML = `
    <div class="edit-modal-content" style="max-width:380px; text-align:center; box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0, 212, 255, 0.15);">
      <div class="edit-modal-header" style="justify-content:center; border-bottom:none; flex-direction:column; gap:16px; padding-bottom:10px;">
        <div class="edit-modal-icon" style="background:rgba(0, 212, 255, 0.1); color:var(--primary); font-size:1.6rem; width:56px; height:56px;">?</div>
        <div class="edit-modal-title" style="font-size:1.15rem; line-height:1.4;">${sanitize(mensaje)}</div>
      </div>
      <div class="edit-modal-actions" style="justify-content:center; gap:15px; border-top:none; padding-top:10px;">
        <button class="edit-btn-cancel" id="confirmModalCancel">Cancelar</button>
        <button class="edit-btn-confirm" id="confirmModalAccept" style="min-width:120px;">Aceptar</button>
      </div>
    </div>
  `;

    document.body.appendChild(overlay);

    document
      .getElementById("confirmModalAccept")
      .addEventListener("click", function () {
        overlay.remove();
        if (onConfirm) onConfirm();
      });

    document
      .getElementById("confirmModalCancel")
      .addEventListener("click", function () {
        overlay.remove();
        if (onCancel) onCancel();
      });

    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) {
        overlay.remove();
        if (onCancel) onCancel();
      }
    });
  }

  /** Crea una fila temporal en la tabla de activas mientras se guarda */
  function crearFilaPendiente(datos) {
    const container = document.getElementById("activasContainer");
    if (!container) return;

    // Solo crear estructura de tabla si está vacío o tiene estado especial
    if (
      container.querySelector(".empty-state") ||
      container.querySelector(".loading") ||
      container.querySelector(".skeleton-table") ||
      container.querySelector(".error-state")
    ) {
      container.innerHTML = `
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Capital</th>
              <th>Fecha Inicio</th>
              <th>CEX</th>
              <th>Monto</th>
              <th>% APR</th>
              <th>Operación</th>
              <th>Interés</th>
              <th>Total calc.</th>
              <th>APR Acum.</th>
              <th>APR Ef.</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    `;
    }

    const tbody = container.querySelector("tbody");
    if (!tbody) return;

    const fechaInicio = formatearFecha(datos.fechaInicio);
    const montoFormateado = formatearMonto(datos.monto, datos.moneda);
    const badgeClass = getBadgeClass(datos.tipoOperacion);
    const monedaKey = String(datos.moneda)
      .toLowerCase()
      .replace(/[^a-z]/g, "");

    const row = document.createElement("tr");
    row.className = "operacion-row anim-row-pending";
    row.innerHTML = `
    <td class="td-nowrap">
      <span class="badge-duration badge-capital">${sanitize(datos.capitalOperacion || currentSheet)}</span>
    </td>
    <td class="td-nowrap">
      <div style="margin-bottom:2px;">${fechaInicio}</div>
      <div class="badge-duration">Procesando...</div>
    </td>
    <td><strong>${datos.cex}</strong></td>
    <td class="td-nowrap">
      <div style="display:flex; align-items:center; gap:8px;">
        <span>${montoFormateado}</span>
        <span class="badge badge-${monedaKey}">${datos.moneda}</span>
      </div>
    </td>
    <td><strong>${datos.apr}%</strong></td>
    <td class="td-nowrap">
      ${renderOperacionCell(datos.tipoOperacion, datos.precioObjetivo)}
    </td>
    <td><div class="skeleton" style="width:60px; height:18px;"></div></td>
    <td><div class="skeleton" style="width:60px; height:18px;"></div></td>
    <td><div class="skeleton" style="width:52px; height:18px;"></div></td>
    <td><div class="skeleton" style="width:52px; height:18px;"></div></td>
    <td></td>
  `;

    tbody.appendChild(row);

    // Scrollear a la tabla para ver el feedback
    container.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  /** Efecto de partículas al eliminar - limitado a la fila */
  function shatterElement(el) {
    const rect = el.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;
    const top = rect.top;
    const left = rect.left;

    // Crear partículas solo dentro del área de la fila
    for (let i = 0; i < 14; i++) {
      const shard = document.createElement("div");
      shard.className = "shatter-fragment";

      // Partículas pequeñas dentro de la fila
      const size = Math.random() * 6 + 3;
      const posX = left + Math.random() * width;
      const posY = top + Math.random() * height;

      shard.style.width = size + "px";
      shard.style.height = size + "px";
      shard.style.left = posX + "px";
      shard.style.top = posY + "px";
      shard.style.borderRadius = "50%";

      // Dispersión contenida solo dentro del área de la fila
      const dx = (Math.random() - 0.5) * width * 0.28;
      const dy = (Math.random() - 0.5) * height * 0.22;
      const scale = Math.random() * 0.25 + 0.12;
      const delay = Math.random() * 0.08;

      shard.style.setProperty("--dx", dx + "px");
      shard.style.setProperty("--dy", dy + "px");
      shard.style.setProperty("--scale", scale);
      shard.style.animationDelay = delay + "s";

      document.body.appendChild(shard);
      setTimeout(() => shard.remove(), 720);
    }
  }

  // ============================================
  // FORMULARIO FLOTANTE
  // ============================================
  function mostrarFormulario() {
    if (!window.editandoFila && DOM.capitalOperacion) {
      DOM.capitalOperacion.disabled = false;
      DOM.capitalOperacion.value = currentSheet;
    }
    const modal = document.getElementById("modalFormulario");
    if (modal) {
      modal.classList.add("active");
      document.body.style.overflow = "hidden";
    }
  }

  function cerrarFormulario(event) {
    if (event && event.target !== event.currentTarget) return;
    if (window.editandoFila) cancelarEdicion();
    const modal = document.getElementById("modalFormulario");
    if (modal) {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }
  }

  function cerrarFormularioDirecto() {
    const modal = document.getElementById("modalFormulario");
    if (modal) {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }
  }

  // ============================================
  // TEMA: MODO OSCURO / CLARO
  // ============================================
  function toggleTheme() {
    const newTheme =
      document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.body.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  }

  // Inicializar tema guardado
  document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark" || !savedTheme) {
      document.body.setAttribute("data-theme", "dark");
    } else {
      document.body.setAttribute("data-theme", "light");
    }
  });

  function toggleFechaFinInput() {
    clearFieldError("groupFechaFin");
    if (DOM.hasFechaFin.checked) {
      DOM.fechaFinCustom.style.display = "block";
      if (DOM.fechaInicio.value) {
        const fechaInicioVal = DOM.fechaInicio.value.split("T")[0];
        DOM.fechaFinCustom.min = fechaInicioVal;
      }
    } else {
      DOM.fechaFinCustom.style.display = "none";
      DOM.fechaFinCustom.value = "";
    }
  }

  function resetCustomFechaFin() {
    if (DOM.hasFechaFin) DOM.hasFechaFin.checked = false;
    if (DOM.fechaFinCustom) {
      DOM.fechaFinCustom.value = "";
      DOM.fechaFinCustom.style.display = "none";
    }
  }
</script>
